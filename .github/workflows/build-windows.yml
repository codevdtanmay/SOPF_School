name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: |
          cd backend
          npm install

      - run: |
          cd frontend
          npm install

      - run: |
          cd frontend
          npm run build

      - run: npm run copy-frontend

      - name: Print package.json
        shell: pwsh
        run: Get-Content package.json

      - name: Show electron-builder version
        run: npx electron-builder --version

      - name: Build Windows
        run: npx electron-builder --win --x64 --publish=never

      - uses: actions/upload-artifact@v4
        with:
          name: SOPF-Windows
          path: release/**